<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b8962c"/>
    </linearGradient>
  </defs>

  <!-- FT Monogram -->
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="80" height="80" rx="16" fill="url(#goldGrad)"/>
    <text x="40" y="52" font-family="'Playfair Display', Georgia, serif" font-size="36" font-weight="700" fill="#0a0a0a" text-anchor="middle">FT</text>
  </g>

  <!-- Text -->
  <text x="120" y="48" font-family="'Playfair Display', Georgia, serif" font-size="22" font-weight="700" fill="#ffffff" letter-spacing="2">FÁBIO TONELLI</text>
  <text x="120" y="72" font-family="'Inter', Arial, sans-serif" font-size="10" font-weight="500" fill="#d4af37" letter-spacing="4">NUTRICIONISTA CLÍNICO</text>

  <!-- Decorative line -->
  <line x1="120" y1="82" x2="300" y2="82" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5"/>
</svg>
